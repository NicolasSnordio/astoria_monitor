<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ settings.app_name if settings else "Astoria Monitor" }}</title>
    <link rel="icon" href="{{ url_for('static', path='favicon-astoria-a.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
  </head>
  <body data-page="{{ active_page or '' }}">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="/" aria-label="Astoria Monitor">
          <img src="{{ url_for('static', path='logo-astoria-sf.png') }}" alt="Astoria">
        </a>
        <nav class="nav-menu" aria-label="Navegacao principal">
          <a class="nav-item {{ 'is-active' if active_page == 'dashboard' else '' }}" href="/">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
            <span>Visao geral</span>
          </a>
          <a class="nav-item {{ 'is-active' if active_page == 'assets' else '' }}" href="/assets">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="11" rx="1.5"/><path d="M9 20h6M12 16v4"/></svg>
            <span>Ativos</span>
          </a>
          <a class="nav-item {{ 'is-active' if active_page == 'reports' else '' }}" href="/reports">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V9h4v11M10 20V4h4v16M15 20v-7h4v7"/></svg>
            <span>Relatorios</span>
          </a>
          <a class="nav-item {{ 'is-active' if active_page == 'alerts' else '' }}" href="/alerts">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg>
            <span>Alertas</span>
          </a>
          <a class="nav-item {{ 'is-active' if active_page == 'inventory' else '' }}" href="/inventory">
            <svg viewBox="0 0 24 24" aria-hidden="true"><ellipse cx="12" cy="5" rx="7" ry="3"/><path d="M5 5v7c0 1.7 3.1 3 7 3s7-1.3 7-3V5M5 12v7c0 1.7 3.1 3 7 3s7-1.3 7-3v-7"/></svg>
            <span>Inventario</span>
          </a>
          <a class="nav-item {{ 'is-active' if active_page == 'users' else '' }}" href="/users">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="8" r="4"/><path d="M2 21a7 7 0 0 1 14 0"/><path d="M17 11h5M19.5 8.5v5"/></svg>
            <span>Usuarios</span>
          </a>
        </nav>
        <button class="collapse-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
          <span>Recolher menu</span>
        </button>
      </aside>
      <div class="workspace">
        <header class="topbar">
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
            <input id="globalSearch" type="search" placeholder="Buscar patrimonio, usuario ou setor">
          </label>
          <div class="top-actions">
            <button class="icon-button has-badge" type="button" aria-label="Notificacoes">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg>
              <span>3</span>
            </button>
            <div class="user-menu">
              <button class="user-button" type="button" aria-expanded="false" aria-controls="userDropdown">
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
                <span>{{ user.display_name if user else 'TI Astoria' }}</span>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
              </button>
              <div class="user-dropdown" id="userDropdown">
                <strong>{{ user.display_name if user else 'TI Astoria' }}</strong>
                <span>Permissao {{ user.permission if user else '100' }}%</span>
                <span>Astoria Monitor v{{ settings.app_version }}</span>
                <a href="/logout">Sair</a>
              </div>
            </div>
          </div>
        </header>
        <main class="page">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
    <div class="modal-backdrop" id="assetModal" aria-hidden="true">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="assetModalTitle">
        <div class="panel-titlebar">
          <h2 id="assetModalTitle">Novo ativo</h2>
          <button class="icon-button js-close-modal" type="button" aria-label="Fechar">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <form class="asset-form" id="assetForm" method="post" action="/assets">
          <label>Patrimonio<input name="patrimony_code" placeholder="2301"></label>
          <label>Nome da maquina<input name="expected_hostname" placeholder="PC-FINANCEIRO01" required></label>
          <label>Usuario<input name="assigned_user" placeholder="Usuario responsavel"></label>
          <label>Setor<input name="sector" placeholder="TI" required></label>
          <label>Tipo / Modelo<input name="equipment_type_model" placeholder="Notebook Latitude 3440"></label>
          <label>ServiceTag<input name="service_tag" placeholder="ABC1234"></label>
          <div class="form-actions">
            <button class="ghost-button js-close-modal" type="button">Cancelar</button>
            <button class="primary-button" type="submit">Salvar ativo</button>
          </div>
        </form>
      </section>
    </div>
    <aside class="filter-drawer" id="filterDrawer" aria-hidden="true">
      <div class="panel-titlebar">
        <h2>Filtros</h2>
        <button class="icon-button js-close-filters" type="button" aria-label="Fechar filtros">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <div class="filter-body">
        <strong>Status</strong>
        <label><input type="checkbox" data-filter-status value="Online" checked> Online</label>
        <label><input type="checkbox" data-filter-status value="Atencao" checked> Atencao</label>
        <label><input type="checkbox" data-filter-status value="Offline" checked> Offline</label>
        <label><input type="checkbox" data-filter-status value="Sem coleta" checked> Sem coleta</label>
        <strong>Tipo</strong>
        <label><input type="checkbox" data-filter-type value="notebook" checked> Notebooks</label>
        <label><input type="checkbox" data-filter-type value="desktop" checked> Desktops</label>
      </div>
      <div class="form-actions">
        <button class="ghost-button" id="clearFilters" type="button">Limpar</button>
        <button class="primary-button js-close-filters" type="button">Aplicar</button>
      </div>
    </aside>
    <script src="{{ url_for('static', path='app.js') }}"></script>
  </body>
</html>
